services:
  backend:
    build: ./backend
    ports:
      - "8417:8417"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface

  frontend:
    build: ./frontend
    ports:
      - "4173:4173" # Vite preview default port is 4173
    depends_on:
      - backend

volumes:
  huggingface_cache:
